<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deja-Mew 🐱🐱🐱</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #ff85a2; /* darker pink background */
  text-align: center;
  margin: 0;
}

h1 {
  margin: 16px 0;
  color: white;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 12px;
  max-width: 600px;
  margin: auto;
}

/* Bigger tiles on desktop */
@media (min-width: 900px) {
  .grid {
    max-width: 700px;
  }
}

.tile {
  aspect-ratio: 1;
  perspective: 1000px;
}

.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.5s;
  transform-style: preserve-3d;
  border-radius: 14px;
}

.inner.flipped {
  transform: rotateY(180deg);
}

/* Light pink tiles */
.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 14px;
  backface-visibility: hidden;
}

.front {
  background: #ffe5ec; /* near-white pink */
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
}

.back {
  transform: rotateY(180deg);
  background-size: cover;
  background-position: center;
}

/* Modal */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: flex;
  justify-content: center;
  align-items: center;
  visibility: hidden;
}

.modal.show {
  visibility: visible;
}

.modal-content {
  background: white;
  padding: 25px;
  border-radius: 16px;
  text-align: center;
  animation: pop 0.3s ease;
}

@keyframes pop {
  from { transform: scale(0.7); }
  to { transform: scale(1); }
}

button {
  margin: 10px;
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  background: #ff69b4;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Deja-Mew 🐱🐱🐱</h1>
<div class="grid" id="grid"></div>

<!-- Sounds (reliable sources) -->
<audio id="meow" src="meow.mp3"></audio>
<audio id="wrong" src="wrong.mp3"></audio>
<audio id="purr" src="purr.mp3"></audio>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>🎉 You did it!</h2>
    <p>All the kitties found 🐱💖</p>
    <button onclick="restart()">Play Again</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const grid = document.getElementById("grid");
const modal = document.getElementById("modal");

const meow = document.getElementById("meow");
const wrong = document.getElementById("wrong");
const purr = document.getElementById("purr");

let tiles=[], firstTile=null, secondTile=null, lockBoard=false;
let audioReady = false;

// Unlock audio
function unlockAudio() {
  if (audioReady) return;

  [meow, wrong, purr].forEach(a => {
    a.play().then(() => {
      a.pause();
      a.currentTime = 0;
    }).catch(()=>{});
  });

  audioReady = true;
}

function playSound(audio, duration = 1000){ // duration in ms
    if(!audio) return;
    audio.currentTime = 0;
    audio.play().catch(()=>{});

    // Stop after duration
    setTimeout(()=>{
        audio.pause();
        audio.currentTime = 0;
    }, duration);
}

// Fetch unique GIFs
async function getGIFs(n) {
  const set = new Set();
  while(set.size < n){
    const res = await fetch(`https://api.thecatapi.com/v1/images/search?limit=${n}&mime_types=gif`);
    const data = await res.json();
    data.forEach(d => set.add(d.url));
  }
  return [...set].slice(0,n);
}

function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

async function start(){
  const gifs = await getGIFs(8);
  const images = shuffle([...gifs, ...gifs]);

  grid.innerHTML="";
  tiles=[]; firstTile=null; secondTile=null; lockBoard=false;

  images.forEach(url=>{
    const tile=document.createElement("div");
    tile.className="tile";

    const inner=document.createElement("div");
    inner.className="inner";

    const front=document.createElement("div");
    front.className="front";
    front.textContent="❓";

    const back=document.createElement("div");
    back.className="back";
    back.style.backgroundImage=`url(${url})`;

    inner.append(front, back);
    tile.append(inner);

    tile.onclick = () => {
      unlockAudio();
      flip(inner,url);
    };

    grid.appendChild(tile);
    tiles.push({inner,url,matched:false});
  });
}

function flip(inner,url){
  if(lockBoard || inner.classList.contains("flipped")) return;

  inner.classList.add("flipped");

  if(!firstTile){
    firstTile={inner,url};
    return;
  }

  secondTile={inner,url};
  lockBoard=true;

  if(firstTile.url === secondTile.url){
    tiles.filter(t=>t.url===url).forEach(t=>t.matched=true);

    playSound(meow, 1000);

    confetti({particleCount:100, spread:100});

    reset();
  } else {
    playSound(wrong, 1000);

    setTimeout(()=>{
      firstTile.inner.classList.remove("flipped");
      secondTile.inner.classList.remove("flipped");
      reset();
    },1500);
  }
}

function reset(){
  [firstTile,secondTile]=[null,null];
  lockBoard=false;

  if(tiles.filter(t=>t.matched).length===16){
    setTimeout(()=>{
      playSound(purr, 1000);

      confetti({particleCount:250, spread:120});

      modal.classList.add("show");
    },500);
  }
}

function restart(){
  modal.classList.remove("show");
  start();
}

start();
</script>

</body>
</html>
